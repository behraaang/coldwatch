# Local development overrides — auto-loaded by `docker compose` alongside docker-compose.yml.
# On the Hetzner deploy, this file is NOT present (or .gitignored if we ever want a server-specific override).
# For now we keep it tracked so dev setup is one command for any contributor.

services:
  web:
    build:
      dockerfile: Dockerfile.dev
    env_file:
      - path: .env.development
        required: false
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://coldwatch:devpass@db:5432/coldwatch_personal_dev
      REDIS_URL: redis://redis:6379/0
    command: >
      bash -c "
        bin/rails db:prepare &&
        bin/rails tailwindcss:build &&
        ( bin/rails tailwindcss:watch & ) &&
        exec bin/rails server -b 0.0.0.0 -p 3000
      "

  sidekiq:
    build:
      dockerfile: Dockerfile.dev
    env_file:
      - path: .env.development
        required: false
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://coldwatch:devpass@db:5432/coldwatch_personal_dev
      REDIS_URL: redis://redis:6379/0

  db:
    environment:
      POSTGRES_USER: coldwatch
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: coldwatch_personal_dev
    ports:
      - "5432:5432"

volumes:
  bundle_cache:
