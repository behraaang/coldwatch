# Production override for the personal stack.
#
# Used on the Hetzner box, where the host already runs nginx + certbot for
# behdev.com and behrangmirzamani.com on :80/:443. The repo's caddy/ stack
# would fight nginx for those ports, so on prod we skip Caddy entirely and
# let the existing nginx terminate TLS and reverse-proxy `coldwatch.behdev.com`
# to the Rails container on a host loopback port.
#
# Usage on the box:
#   cd /opt/coldwatch/personal
#   docker network create coldwatch_web 2>/dev/null || true
#   docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --build
#
# Local dev keeps using docker-compose.override.yml (auto-loaded). Production
# does NOT auto-load .override.yml because we explicitly pass -f flags.

services:
  web:
    ports:
      # Bind to loopback only — nginx on the host proxies to this port.
      # Public exposure is gated by the nginx site config, not Docker.
      - "127.0.0.1:3001:3000"
    environment:
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"

  sidekiq:
    environment:
      RAILS_LOG_TO_STDOUT: "true"
      BOOTSTRAP_RECURRING_JOBS: "true"

  mempool_subscriber:
    environment:
      RAILS_LOG_TO_STDOUT: "true"
