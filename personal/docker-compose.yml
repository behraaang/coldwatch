# Personal stack — your real xpub lives here.
# This file expects a Rails app at ./ (created by BOOTSTRAP.md step 2).

name: coldwatch_personal

services:
  web:
    build: .
    container_name: coldwatch_personal_web
    env_file:
      - path: .env
        required: false
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://coldwatch:${POSTGRES_PASSWORD}@db:5432/coldwatch_personal
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - internal
      - coldwatch_web
    restart: unless-stopped

  mempool_subscriber:
    build: .
    container_name: coldwatch_personal_mempool_subscriber
    command: bin/rails runner "MempoolSubscriber.run"
    env_file:
      - path: .env
        required: false
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://coldwatch:${POSTGRES_PASSWORD}@db:5432/coldwatch_personal
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - internal
    restart: unless-stopped

  sidekiq:
    build: .
    container_name: coldwatch_personal_sidekiq
    command: bundle exec sidekiq
    env_file:
      - path: .env
        required: false
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://coldwatch:${POSTGRES_PASSWORD}@db:5432/coldwatch_personal
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - internal
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: coldwatch_personal_db
    environment:
      POSTGRES_USER: coldwatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: coldwatch_personal
    volumes:
      - personal_pgdata:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: coldwatch_personal_redis
    volumes:
      - personal_redis:/data
    networks:
      - internal
    restart: unless-stopped

volumes:
  personal_pgdata:
  personal_redis:

networks:
  internal:
    driver: bridge
  coldwatch_web:
    external: true
