# Caddy reverse proxy — TLS termination + virtual hosts for both subdomains.
# This stack must be brought up AFTER personal/ and demo/ so the upstream containers exist.

name: coldwatch_caddy

services:
  caddy:
    image: caddy:2-alpine
    container_name: coldwatch_caddy
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    networks:
      - coldwatch_web
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  caddy_logs:

networks:
  coldwatch_web:
    name: coldwatch_web
    driver: bridge
