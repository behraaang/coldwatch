name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  xpub-guard:
    name: xpub leakage guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run xpub grep guard
        run: |
          chmod +x scripts/grep-xpub-guard.sh
          ./scripts/grep-xpub-guard.sh

  lint-compose:
    name: docker-compose lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate personal stack
        run: docker compose -f personal/docker-compose.yml config --quiet
      - name: Validate demo stack
        run: docker compose -f demo/docker-compose.yml config --quiet
      - name: Validate caddy stack
        run: docker compose -f caddy/docker-compose.yml config --quiet
        env:
          DOMAIN: example.com
          HOME_IP: 1.2.3.4/32
          ACME_EMAIL: ci@example.com

  rails-tests:
    name: rails minitest (personal)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: coldwatch
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: coldwatch_personal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coldwatch"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://coldwatch:postgres@localhost:5432/coldwatch_personal_test
      # Disable Minitest parallelization in CI. With workers > 1 Rails appends
      # -0/-1/... to the DB name and expects each per-worker DB to exist; on a
      # fresh CI postgres they do not, and creating them per worker is not
      # worth the speed-up for ~120 tests that finish in ~10s sequentially.
      PARALLEL_WORKERS: 1
      # ActiveRecord encryption keys are read in config/application.rb at boot,
      # so they must exist in the OS env before Rails loads — earlier than
      # test_helper runs. Test-only fake keys; they have no security value.
      RAILS_ENCRYPTION_PRIMARY_KEY: test_primary_key_aaaaaaaaaaaaaaaaaaaaaaaaaaaa
      RAILS_ENCRYPTION_DETERMINISTIC_KEY: test_deterministic_key_aaaaaaaaaaaaaaaaaaaaaaa
      RAILS_ENCRYPTION_KEY_DERIVATION_SALT: test_derivation_salt_aaaaaaaaaaaaaaaaaaaaaaaaa

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          working-directory: personal
          bundler-cache: true

      - name: Build Tailwind CSS
        working-directory: personal
        run: bin/rails tailwindcss:build

      - name: Load schema
        working-directory: personal
        run: bin/rails db:schema:load

      - name: Run tests
        working-directory: personal
        run: bin/rails test
